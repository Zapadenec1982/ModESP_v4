name: ci

on:
  push:
    branches: [main]
  pull_request:

# Скасовувати застарілі запуски на тій самій гілці/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: генератор UI + валідація маніфестів (швидко, без ESP-IDF) ──
  py-tests:
    name: Python (generator + manifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: pip install pytest
      - name: Run pytest
        # Виключаємо HOST C++ міст (test_cpp_host — Windows-only шляхи)
        # та HIL (потребує реального ESP32 у мережі).
        run: |
          python -m pytest tools/tests \
            --ignore=tools/tests/test_cpp_host.py \
            --ignore=tools/tests/test_hil.py \
            -v

  # ── WebUI + Firmware build (єдиний пайплайн) + HOST C++ тести ──
  build-and-host-tests:
    name: WebUI + firmware build + host doctest
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5
    steps:
      - uses: actions/checkout@v4

      # Node для інтегрованої збірки WebUI у складі idf.py build.
      # Без нього CMake gracefully пропустив би webui (закомічений bundle),
      # але тут хочемо перевірити саме об'єднаний пайплайн.
      - name: Install Node.js
        shell: bash
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y --no-install-recommends nodejs

      # idf.py build: копіює boards/dev/board.json → data/, запускає
      # generate_ui.py (generated/*.h), збирає WebUI (npm ci + rollup →
      # data/www), завантажує ETL і компілює прошивку під ESP32.
      - name: ESP-IDF build (incl. WebUI)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py build

      # HOST doctest suite (109 тестів) — використовує generated/ та ETL,
      # створені кроком вище. Збірка нативним g++ (не xtensa).
      - name: Host C++ tests
        shell: bash
        run: |
          apt-get update && apt-get install -y --no-install-recommends g++
          . "$IDF_PATH/export.sh"   # cmake + ninja з ESP-IDF tools
          cmake -G Ninja -S tests/host -B tests/host/build
          cmake --build tests/host/build
          ./tests/host/build/test_runner
